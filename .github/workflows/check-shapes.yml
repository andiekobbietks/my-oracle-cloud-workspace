name: Check OCI shapes

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  check-shapes:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Run shape whitelist checker
        run: |
          python3 tools/check_shapes_pr.py --base origin/main --whitelist config/allowed_shapes.json
